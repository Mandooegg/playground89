<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0,viewport-fit=cover">
<title>SITE-MASTER v3.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg0:#0a0e17;--bg1:#111827;--bg2:#1a2235;--bg3:#1f2a40;--blue:#3b82f6;--cyan:#06b6d4;--green:#10b981;--amber:#f59e0b;--red:#ef4444;--purple:#8b5cf6;--t1:#f1f5f9;--t2:#94a3b8;--t3:#64748b;--b1:#1e293b;--b2:#334155;--r:12px;--rs:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg0);color:var(--t1);overflow:hidden}
#LP{display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#0a0e17,#1a1a2e);padding:16px}
.lc{background:rgba(26,34,53,.95);border:1px solid var(--b2);border-radius:20px;padding:32px;width:100%;max-width:400px}
.lc h1{font-size:24px;text-align:center;margin-bottom:20px;background:linear-gradient(135deg,var(--blue),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.fg{margin-bottom:16px}.fg label{display:block;font-size:11px;color:var(--t3);margin-bottom:6px}
.fg input{width:100%;padding:12px;background:var(--bg1);border:1px solid var(--b1);border-radius:var(--rs);color:var(--t1);font-size:16px;outline:none}
.bp{width:100%;padding:14px;background:linear-gradient(135deg,var(--blue),var(--cyan));border:none;border-radius:var(--rs);color:#fff;font-size:16px;font-weight:700;cursor:pointer}
#AP{display:none;height:100vh;flex-direction:column}
.sb{width:250px;background:var(--bg1);border-right:1px solid var(--b1);padding:20px}
.mc{flex:1;padding:20px;overflow-y:auto}
.ni{padding:12px;border-radius:8px;color:var(--t2);cursor:pointer;margin-bottom:5px}
.ni.active{background:rgba(59,130,246,.1);color:var(--blue)}
</style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="LP">
    <div class="lc">
        <h1>SITE-MASTER v3.0</h1>
        <div class="fg"><label>이메일</label><input id="loginId" type="email" placeholder="email@example.com"></div>
        <div class="fg"><label>비밀번호</label><input id="loginPw" type="password"></div>
        <button class="bp" onclick="doLogin()">로그인</button>
        <p id="msg" style="margin-top:15px; text-align:center; color:var(--red); font-size:12px;"></p>
    </div>
</div>

<!-- 메인 앱 화면 -->
<div id="AP">
    <div style="display:flex; height:100%;">
        <aside class="sb">
            <h2 style="font-size:18px; margin-bottom:20px;">SITE-MASTER</h2>
            <div class="ni active">📊 대시보드</div>
            <div id="adminMenu" style="display:none;">
                <div style="font-size:10px; color:var(--t3); margin:15px 0 5px 10px;">관리자</div>
                <div class="ni">⚙️ 현장 설정</div>
            </div>
            <button onclick="location.reload()" style="margin-top:auto; width:100%; padding:10px; border:none; background:var(--bg3); color:var(--t3); border-radius:8px; cursor:pointer;">로그아웃</button>
        </aside>
        <main class="mc">
            <h2 id="PT">대시보드</h2>
            <div id="content" style="margin-top:20px;">접속 성공! 환영합니다.</div>
        </main>
    </div>
</div>

<!-- 라이브러리 로드 -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// --- [본인의 정보로 반드시 수정하세요] ---
const SUPABASE_URL = 'https://lzipjygacjdrnhkzgmjv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_8OGkXVk-b-e9ndh74bFjpg_r6ynxjU7';
// ------------------------------------

// Supabase 초기화 방식 수정
const { createClient } = supabase;
const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

async function doLogin() {
    const email = document.getElementById('loginId').value;
    const password = document.getElementById('loginPw').value;
    const msg = document.getElementById('msg');

    if(!email || !password) {
        msg.textContent = "아이디와 비밀번호를 입력하세요.";
        return;
    }

    msg.style.color = "var(--blue)";
    msg.textContent = "로그인 시도 중...";

    try {
        const { data, error } = await _supabase.auth.signInWithPassword({ email, password });

        if (error) {
            msg.style.color = "var(--red)";
            msg.textContent = "로그인 실패: " + error.message;
            return;
        }

        // 로그인 성공 시 프로필 확인
        const { data: profile, error: pError } = await _supabase
            .from('profiles')
            .select('*')
            .eq('id', data.user.id)
            .single();

        document.getElementById('LP').style.display = 'none';
        document.getElementById('AP').style.display = 'flex';

        if(profile && profile.role === 'admin') {
            document.getElementById('adminMenu').style.display = 'block';
        }

    } catch (e) {
        msg.style.color = "var(--red)";
        msg.textContent = "시스템 오류: " + e.message;
    }
}
</script>
</body>
</html>
