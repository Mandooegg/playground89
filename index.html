<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0,viewport-fit=cover">
<title>SITE-MASTER v3.0</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
/* 기존 디자인 스타일 시트 */
:root{--bg0:#0a0e17;--bg1:#111827;--bg2:#1a2235;--bg3:#1f2a40;--blue:#3b82f6;--cyan:#06b6d4;--green:#10b981;--amber:#f59e0b;--red:#ef4444;--purple:#8b5cf6;--t1:#f1f5f9;--t2:#94a3b8;--t3:#64748b;--b1:#1e293b;--b2:#334155;--r:12px;--rs:8px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{font-family:'Noto Sans KR',system-ui,-apple-system,sans-serif;background:var(--bg0);color:var(--t1);height:100%;height:100dvh;overflow-x:hidden}
#LP{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0a0e17,#1a1a2e,#16213e);padding:16px}
.lc{background:rgba(26,34,53,.95);border:1px solid var(--b2);border-radius:20px;padding:32px;width:400px;max-width:100%}
.lc h1{font-size:24px;font-weight:900;background:linear-gradient(135deg,var(--blue),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;letter-spacing:2px}
.fg{margin-bottom:16px}.fg label{display:block;font-size:11px;color:var(--t3);margin-bottom:6px}
.fg input,.fg select{width:100%;padding:12px;background:var(--bg1);border:1px solid var(--b1);border-radius:var(--rs);color:var(--t1);font-size:16px;outline:none}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border:none;border-radius:var(--rs);font-weight:500;cursor:pointer}
.bp{width:100%;padding:14px;background:linear-gradient(135deg,var(--blue),var(--cyan));color:#fff;font-size:15px;font-weight:700}
#AP{display:none;height:100vh}
.al{display:flex;height:100%}
.sb{width:250px;background:var(--bg1);border-right:1px solid var(--b1);display:flex;flex-direction:column}
.sbh{padding:14px;border-bottom:1px solid var(--b1)}
.mc{flex:1;display:flex;flex-direction:column;overflow:hidden}
.ch{padding:12px 16px;border-bottom:1px solid var(--b1);background:var(--bg1)}
.cb{flex:1;overflow-y:auto;padding:16px}
.pg{display:none}.pg.active{display:block}
.cd{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);padding:16px;margin-bottom:14px}
.ct{font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.gr{display:grid;gap:12px}.g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
.sc{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);padding:14px}
.sv{font-size:22px;font-weight:900;margin:3px 0}
.ni{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:var(--rs);color:var(--t2);cursor:pointer;font-size:12px}
.ni.active{background:rgba(59,130,246,.12);color:var(--blue)}
</style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="LP">
    <div class="lc">
        <h1>SITE-MASTER v3.0</h1>
        <p style="text-align:center; color:var(--t3); font-size:12px; margin-bottom:20px;">현장 통합 관리 시스템</p>
        <div class="fg"><label>이메일 아이디</label><input id="loginId" type="email" placeholder="email@example.com"></div>
        <div class="fg"><label>비밀번호</label><input type="password" id="loginPw"></div>
        <button class="btn bp" onclick="doLogin()">로그인</button>
        <div id="loginMsg" style="margin-top:15px; color:var(--red); font-size:12px; text-align:center;"></div>
    </div>
</div>

<!-- 메인 앱 화면 -->
<div id="AP">
    <div class="al">
        <aside class="sb">
            <div class="sbh"><h2>SITE-MASTER</h2><div id="SN" style="font-size:10px; color:var(--t3)">현장 접속 중...</div></div>
            <nav style="flex:1; padding:10px;">
                <div class="ni active" onclick="nav('dash')">📊 대시보드</div>
                <div class="admin-only" id="adminMenu" style="display:none">
                    <div style="font-size:10px; color:var(--t3); margin:15px 0 5px 14px;">시스템 관리</div>
                    <div class="ni" onclick="nav('adminSites')">⚙️ 현장 설정</div>
                </div>
            </nav>
            <div style="padding:10px;"><button class="btn bp" style="background:var(--bg3)" onclick="location.reload()">로그아웃</button></div>
        </aside>
        <main class="mc">
            <div class="ch"><h2 id="PT">대시보드</h2></div>
            <div class="cb">
                <div class="pg active" id="pg-dash">
                    <div class="gr g4" id="DS"></div>
                    <div class="cd" style="margin-top:20px;"><div class="ct">최근 시공 현황</div><div id="latestProg"></div></div>
                </div>
                <div class="pg" id="pg-adminSites">
                    <div class="cd">
                        <div class="ct">현장 마스터 리스트 <button class="btn bg" style="font-size:11px; margin-left:auto;">+ 현장 추가</button></div>
                        <div id="adminSiteGrid" class="gr g3"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// --- [중요] 여기에 본인의 Supabase 정보를 넣으세요 ---
const SUPABASE_URL = 'https://lzipjygacjdrnhkzgmjv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_8OGkXVk-b-e9ndh74bFjpg_r6ynxjU7';
// ----------------------------------------------

const supabase = libSupabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let CU = null;

// 로그인 함수
async function doLogin() {
    const email = document.getElementById('loginId').value;
    const password = document.getElementById('loginPw').value;
    const msg = document.getElementById('loginMsg');

    msg.textContent = "로그인 중...";

    const { data, error } = await supabase.auth.signInWithPassword({ email, password });

    if (error) {
        msg.textContent = "오류: " + error.message;
        return;
    }

    const { data: profile } = await supabase.from('profiles').select('*').eq('id', data.user.id).single();
    CU = { ...data.user, ...profile };

    document.getElementById('LP').style.display = 'none';
    document.getElementById('AP').style.display = 'block';

    setupApp();
}

function setupApp() {
    const isAdmin = CU.role === 'admin';
    document.getElementById('adminMenu').style.display = isAdmin ? 'block' : 'none';
    
    if (isAdmin) {
        nav('adminSites');
        renderAdminSites();
    } else {
        nav('dash');
        renderDashboard();
    }
}

function nav(p) {
    document.querySelectorAll('.pg').forEach(el => el.classList.remove('active'));
    document.getElementById('pg-' + p).classList.add('active');
    document.getElementById('PT').textContent = p === 'dash' ? '대시보드' : '현장 설정';
}

async function renderAdminSites() {
    const { data: sites } = await supabase.from('sites').select('*');
    const grid = document.getElementById('adminSiteGrid');
    if (!sites) return;
    grid.innerHTML = sites.map(s => `
        <div class="sc">
            <div style="font-weight:700;">${s.name}</div>
            <div style="font-size:11px; color:var(--t2);">${s.location}</div>
        </div>
    `).join('');
}

async function renderDashboard() {
    // 담당자용 대시보드 로직
    document.getElementById('DS').innerHTML = '<p>데이터를 불러오는 중...</p>';
}

// 서비스 워커 등록
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); });
}
</script>
</body>
</html>
