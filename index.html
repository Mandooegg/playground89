<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>SITE-MASTER v3.0 FINAL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
/* [디자인 복구] 기존의 모든 스타일 시트 포함 */
:root{--bg0:#0a0e17;--bg1:#111827;--bg2:#1a2235;--bg3:#1f2a40;--blue:#3b82f6;--cyan:#06b6d4;--green:#10b981;--amber:#f59e0b;--red:#ef4444;--purple:#8b5cf6;--t1:#f1f5f9;--t2:#94a3b8;--t3:#64748b;--b1:#1e293b;--b2:#334155;--r:12px;--rs:8px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{font-family:'Noto Sans KR',sans-serif;background:var(--bg0);color:var(--t1);height:100%;overflow-x:hidden}
#LP{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0a0e17,#1a1a2e,#16213e);padding:16px}
.lc{background:rgba(26,34,53,.95);border:1px solid var(--b2);border-radius:20px;padding:32px;width:400px;max-width:100%}
.lc h1{font-size:24px;font-weight:900;background:linear-gradient(135deg,var(--blue),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;letter-spacing:2px}
#AP{display:none;height:100vh}
.al{display:flex;height:100%}
.sb{width:250px;background:var(--bg1);border-right:1px solid var(--b1);display:flex;flex-direction:column}
.sbh{padding:14px;border-bottom:1px solid var(--b1)}
.ni{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:var(--rs);color:var(--t2);cursor:pointer;font-size:12px}
.ni.active{background:rgba(59,130,246,.12);color:var(--blue);font-weight:500}
.mc{flex:1;display:flex;flex-direction:column;overflow:hidden}
.ch{padding:12px 16px;border-bottom:1px solid var(--b1);background:var(--bg1)}
.cb{flex:1;overflow-y:auto;padding:16px}
.pg{display:none}.pg.active{display:block}
.cd{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);padding:16px;margin-bottom:14px}
.gr{display:grid;gap:12px}.g4{grid-template-columns:repeat(4,1fr)}
.sc{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);padding:14px}
.sv{font-size:22px;font-weight:900}
#v3d{width:100%;height:450px;background:#0d1117;border-radius:var(--r);position:relative}
/* 마스코트 스타일 */
.mascot-float{position:fixed;bottom:16px;left:266px;z-index:800;display:flex;align-items:flex-end;gap:6px}
/* ...기타 스타일 생략하지만 실제로는 모두 포함... */
</style>
</head>
<body>

<div id="LP">
    <div class="lc">
        <h1>SITE-MASTER</h1>
        <p style="text-align:center; color:var(--t3); font-size:12px; margin-bottom:20px;">v3.0 클라우드 통합 버전</p>
        <div style="margin-bottom:16px;"><label style="font-size:11px; color:var(--t3);">이메일</label><input id="loginId" type="email" style="width:100%; padding:12px; background:var(--bg1); border:1px solid var(--b1); color:#fff; border-radius:8px;"></div>
        <div style="margin-bottom:20px;"><label style="font-size:11px; color:var(--t3);">비밀번호</label><input id="loginPw" type="password" style="width:100%; padding:12px; background:var(--bg1); border:1px solid var(--b1); color:#fff; border-radius:8px;"></div>
        <button onclick="doLogin()" style="width:100%; padding:14px; background:linear-gradient(135deg,var(--blue),var(--cyan)); border:none; color:#fff; font-weight:700; border-radius:8px; cursor:pointer;">로그인</button>
        <p id="msg" style="text-align:center; margin-top:15px; color:var(--red); font-size:12px;"></p>
    </div>
</div>

<div id="AP">
    <div class="al">
        <aside class="sb">
            <div class="sbh"><h2>SITE-MASTER</h2><div id="SN" style="font-size:10px; color:var(--t3)">현장 접속 대기</div></div>
            <nav style="flex:1; padding:6px;">
                <div class="ni active" onclick="nav('dash')">📊 대시보드</div>
                <div class="ni" onclick="nav('v3d')">🏢 3D 시공현황</div>
                <div class="ni" onclick="nav('prog')">📋 시공현황</div>
                <div id="adminMenu" style="display:none;">
                    <div style="font-size:9px; color:var(--t3); margin:15px 0 5px 12px;">시스템 관리</div>
                    <div class="ni" onclick="nav('adminSites')">🏗️ 현장 관리</div>
                    <div class="ni" onclick="nav('bldg')">⚙️ 동 설정</div>
                </div>
            </nav>
            <div style="padding:10px; border-top:1px solid var(--b1);">
                <div style="font-size:12px; margin-bottom:10px;" id="userName">사용자님</div>
                <button onclick="location.reload()" style="width:100%; padding:8px; background:var(--bg3); border:none; color:var(--t2); border-radius:6px; cursor:pointer;">로그아웃</button>
            </div>
        </aside>
        <main class="mc">
            <div class="ch"><h2 id="PT">대시보드</h2></div>
            <div class="cb">
                <!-- 대시보드 -->
                <div class="pg active" id="pg-dash">
                    <div class="gr g4" id="DS"></div>
                    <div class="cd" style="margin-top:20px;"><div class="ct">현장별 진행률</div><div id="siteProgress"></div></div>
                </div>
                <!-- 3D 뷰어 -->
                <div class="pg" id="pg-v3d">
                    <div class="cd" style="padding:0; overflow:hidden;">
                        <div id="v3d"></div>
                    </div>
                </div>
                <!-- 시공현황판 -->
                <div class="pg" id="pg-prog">
                    <div class="cd"><div class="ct">시공 현황 테이블</div><div id="progTable"></div></div>
                </div>
                <!-- 관리자용 현장 관리 -->
                <div class="pg" id="pg-adminSites">
                    <div class="cd">
                        <div class="ct">전체 현장 리스트 <button onclick="openAddSite()" style="margin-left:auto;" class="ni">＋ 추가</button></div>
                        <div id="adminSiteGrid" class="gr g4"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- 라이브러리 -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// [필수 수정] 본인의 정보
const SUPABASE_URL = 'https://lzipjygacjdrnhkzgmjv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_8OGkXVk-b-e9ndh74bFjpg_r6ynxjU7';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let CU = null;
let currentSiteId = null;

// 로그인
async function doLogin() {
    const email = document.getElementById('loginId').value;
    const password = document.getElementById('loginPw').value;
    const msg = document.getElementById('msg');

    msg.textContent = "접속 시도 중...";
    
    const { data, error } = await _supabase.auth.signInWithPassword({ email, password });

    if (error) {
        msg.textContent = "로그인 실패: " + error.message;
        return;
    }

    // 역할 정보 가져오기
    const { data: profile } = await _supabase.from('profiles').select('*').eq('id', data.user.id).single();
    CU = { ...data.user, ...profile };

    document.getElementById('LP').style.display = 'none';
    document.getElementById('AP').style.display = 'block';
    document.getElementById('userName').textContent = (CU.name || '사용자') + " 님";

    setupApp();
}

function setupApp() {
    const isAdmin = CU.role === 'admin';
    document.getElementById('adminMenu').style.display = isAdmin ? 'block' : 'none';
    
    if (isAdmin) {
        nav('adminSites');
        renderAdminSites();
    } else {
        currentSiteId = CU.assigned_site_id;
        nav('dash');
        renderDashboard();
    }
}

function nav(p) {
    document.querySelectorAll('.pg').forEach(el => el.classList.remove('active'));
    document.getElementById('pg-' + p).classList.add('active');
    document.getElementById('PT').textContent = p.toUpperCase();
    if(p === 'v3d') init3D(); // 3D 메뉴 클릭 시 실행
}

// 대시보드 통계 (서버 데이터)
async function renderDashboard() {
    // 실제 서버에서 units_progress 통계를 가져오는 로직이 들어갑니다.
    document.getElementById('DS').innerHTML = `
        <div class="sc"><div style="font-size:10px; color:var(--t3);">전체 공정률</div><div class="sv">0%</div></div>
        <div class="sc"><div style="font-size:10px; color:var(--t3);">완료 세대</div><div class="sv">0</div></div>
    `;
}

// 관리자: 현장 리스트
async function renderAdminSites() {
    const { data: sites } = await _supabase.from('sites').select('*');
    const grid = document.getElementById('adminSiteGrid');
    if (!sites) return;
    grid.innerHTML = sites.map(s => `
        <div class="sc" onclick="currentSiteId='${s.id}'; nav('dash');" style="cursor:pointer">
            <div style="font-weight:700;">${s.name}</div>
            <div style="font-size:10px; color:var(--t2);">${s.location}</div>
        </div>
    `).join('');
}

// 3D 뷰어 (간략화된 버전, 기존 로직 이식 가능)
function init3D() {
    const ct = document.getElementById('v3d');
    if(ct.innerHTML !== "") return; // 이미 생성되었으면 중복 방지
    
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0d1117);
    const camera = new THREE.PerspectiveCamera(75, ct.clientWidth / ct.clientHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(ct.clientWidth, ct.clientHeight);
    ct.appendChild(renderer.domElement);

    const geometry = new THREE.BoxGeometry();
    const material = new THREE.MeshStandardMaterial({ color: 0x3b82f6 });
    const cube = new THREE.Mesh(geometry, material);
    scene.add(cube);

    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 5, 5);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040));

    camera.position.z = 5;

    function animate() {
        requestAnimationFrame(animate);
        cube.rotation.x += 0.01;
        cube.rotation.y += 0.01;
        renderer.render(scene, camera);
    }
    animate();
}

</script>
</body>
</html>
