<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0,viewport-fit=cover">
<title>SITE-MASTER v3.0 - Cloud</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
/* [스타일 복구] 기존의 모든 테마와 디자인 변수 */
:root{--bg0:#0a0e17;--bg1:#111827;--bg2:#1a2235;--bg3:#1f2a40;--blue:#3b82f6;--cyan:#06b6d4;--green:#10b981;--amber:#f59e0b;--red:#ef4444;--purple:#8b5cf6;--t1:#f1f5f9;--t2:#94a3b8;--t3:#64748b;--b1:#1e293b;--b2:#334155;--r:12px;--rs:8px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{font-family:'Noto Sans KR',sans-serif;background:var(--bg0);color:var(--t1);height:100%;overflow:hidden}
/* Layout */
#LP{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0a0e17,#1a1a2e,#16213e);padding:16px}
.lc{background:rgba(26,34,53,.95);border:1px solid var(--b2);border-radius:20px;padding:32px;width:400px;max-width:100%}
#AP{display:none;height:100vh}
.al{display:flex;height:100%}
.sb{width:250px;background:var(--bg1);border-right:1px solid var(--b1);display:flex;flex-direction:column;z-index:900}
.mc{flex:1;display:flex;flex-direction:column;overflow:hidden}
.cb{flex:1;overflow-y:auto;padding:16px}
.pg{display:none}.pg.active{display:block}
/* Components */
.cd{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);padding:16px;margin-bottom:14px}
.sc{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);padding:14px}
.sv{font-size:22px;font-weight:900}
.ni{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:var(--rs);color:var(--t2);cursor:pointer;font-size:12px}
.ni.active{background:rgba(59,130,246,.12);color:var(--blue);font-weight:500}
/* 3D Viewer */
#v3d{width:100%;height:500px;background:#0d1117;border-radius:var(--r);position:relative;overflow:hidden}
.v-toolbar{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:4px;background:rgba(10,14,23,.9);padding:6px;border-radius:16px}
/* Mascot */
.mascot-float{position:fixed;bottom:16px;left:266px;z-index:800;display:flex;align-items:flex-end;gap:6px}
.mascot-bubble{background:var(--bg2);border:1px solid var(--b2);border-radius:12px 12px 12px 4px;padding:10px;max-width:200px;font-size:11px}
</style>
</head>
<body>

<!-- [로그인 화면] -->
<div id="LP">
    <div class="lc">
        <h1>SITE-MASTER</h1>
        <p style="text-align:center; color:var(--t3); font-size:11px; margin-bottom:24px;">v3.0 Cloud Management</p>
        <div style="margin-bottom:16px;"><label style="font-size:11px; color:var(--t3);">이메일</label><input id="loginId" type="email" style="width:100%; padding:12px; background:var(--bg1); border:1px solid var(--b1); color:#fff; border-radius:8px;"></div>
        <div style="margin-bottom:20px;"><label style="font-size:11px; color:var(--t3);">비밀번호</label><input id="loginPw" type="password" style="width:100%; padding:12px; background:var(--bg1); border:1px solid var(--b1); color:#fff; border-radius:8px;"></div>
        <button onclick="doLogin()" style="width:100%; padding:14px; background:linear-gradient(135deg,var(--blue),var(--cyan)); border:none; color:#fff; font-weight:700; border-radius:8px; cursor:pointer;">서버 접속</button>
        <p id="msg" style="text-align:center; margin-top:15px; color:var(--red); font-size:12px;"></p>
    </div>
</div>

<!-- [메인 앱 화면] -->
<div id="AP">
    <div class="al">
        <aside class="sb">
            <div style="padding:20px; border-bottom:1px solid var(--b1);"><h2>SITE-MASTER</h2><div id="SN" style="font-size:10px; color:var(--t3)">현장 연결됨</div></div>
            <nav style="flex:1; padding:10px;">
                <div class="ni active" data-p="dash" onclick="nav('dash')">📊 대시보드</div>
                <div class="ni" data-p="v3d" onclick="nav('v3d')">🏢 3D 시공현황</div>
                <div class="ni" data-p="prog" onclick="nav('prog')">📋 시공현황</div>
                <div id="adminMenu" style="display:none;">
                    <div style="font-size:9px; color:var(--t3); margin:15px 0 5px 12px;">ADMIN</div>
                    <div class="ni" data-p="adminSites" onclick="nav('adminSites')">🏗️ 현장 관리</div>
                    <div class="ni" data-p="bldg" onclick="nav('bldg')">⚙️ 동 설정</div>
                </div>
            </nav>
            <div style="padding:15px; border-top:1px solid var(--b1);">
                <div id="userName" style="font-size:12px; margin-bottom:10px; font-weight:700;">사용자</div>
                <button onclick="location.reload()" style="width:100%; padding:8px; background:var(--bg3); border:none; color:var(--t2); border-radius:6px; cursor:pointer;">로그아웃</button>
            </div>
        </aside>
        <main class="mc">
            <div class="ch"><h2 id="PT">대시보드</h2></div>
            <div class="cb">
                <!-- 페이지: 대시보드 -->
                <div class="pg active" id="pg-dash">
                    <div class="gr g4" id="DS">
                        <div class="sc"><div style="color:var(--t3); font-size:10px;">현황</div><div class="sv">0%</div></div>
                        <div class="sc"><div style="color:var(--t3); font-size:10px;">완료</div><div class="sv">0</div></div>
                    </div>
                </div>
                <!-- 페이지: 3D 뷰어 -->
                <div class="pg" id="pg-v3d">
                    <div class="cd" style="padding:0; overflow:hidden;">
                        <div id="v3d">
                            <div class="v-toolbar">
                                <button onclick="reset3DCam()" style="padding:4px 10px; border:none; background:var(--bg1); color:#fff; border-radius:10px; font-size:10px; cursor:pointer;">카메라 리셋</button>
                                <button onclick="toggleSun()" style="padding:4px 10px; border:none; background:var(--bg1); color:#fff; border-radius:10px; font-size:10px; cursor:pointer;">☀️ 태양광</button>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- 페이지: 시공현황판 -->
                <div class="pg" id="pg-prog">
                    <div class="cd"><div class="ct">시공 데이터 시트</div><div id="progTable"></div></div>
                </div>
                <!-- 페이지: 관리자 전용 -->
                <div class="pg" id="pg-adminSites">
                    <div class="cd"><div class="ct">현장 마스터 리스트</div><div id="adminSiteGrid" class="gr g4"></div></div>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- [마스코트 복구] -->
<div class="mascot-float" id="mascotFloat">
    <div id="mascotBody" onclick="mascotPoke()"></div>
    <div class="mascot-bubble" id="mascotBubble" style="display:none">
        <div id="mbMsg"></div>
    </div>
</div>

<!-- 라이브러리 로드 -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// --- [Supabase 설정] 본인 정보 입력 ---
const SUPABASE_URL = 'https://lzipjygacjdrnhkzgmjv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_8OGkXVk-b-e9ndh74bFjpg_r6ynxjU7';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let CU = null; 
let currentSiteId = null;

// [로그인 로직]
async function doLogin() {
    const email = document.getElementById('loginId').value;
    const password = document.getElementById('loginPw').value;
    const msg = document.getElementById('msg');
    msg.textContent = "서버 연결 중...";

    const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
    if (error) { msg.textContent = "오류: " + error.message; return; }

    const { data: profile } = await _supabase.from('profiles').select('*').eq('id', data.user.id).single();
    CU = { ...data.user, ...profile };

    document.getElementById('LP').style.display = 'none';
    document.getElementById('AP').style.display = 'block';
    document.getElementById('userName').textContent = CU.name + " 님";
    setupApp();
    mascotReact('login');
}

function setupApp() {
    const isAdmin = CU.role === 'admin';
    document.getElementById('adminMenu').style.display = isAdmin ? 'block' : 'none';
    if(isAdmin) { nav('adminSites'); renderAdminSites(); }
    else { currentSiteId = CU.assigned_site_id; nav('dash'); }
}

function nav(p) {
    document.querySelectorAll('.pg').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.ni').forEach(el => el.classList.remove('active'));
    document.getElementById('pg-' + p).classList.add('active');
    document.querySelector(`[data-p="${p}"]`)?.classList.add('active');
    document.getElementById('PT').textContent = p.toUpperCase();
    if(p === 'v3d') init3D();
}

// [마스코트 엔진 복구]
function blobSVG(mood) {
    const colors = { happy: '#3b82f6', proud: '#10b981', alert: '#ef4444' };
    const c = colors[mood] || colors.happy;
    return `<svg width="64" height="64" viewBox="0 0 200 200"><circle cx="100" cy="130" r="50" fill="${c}"/><path d="M56 80 Q100 50 144 80" stroke="#f59e0b" stroke-width="10" fill="none"/><circle cx="80" cy="115" r="8" fill="#000"/><circle cx="120" cy="115" r="8" fill="#000"/><path d="M85 145 Q100 160 115 145" stroke="#000" stroke-width="3" fill="none"/></svg>`;
}
function mascotReact(type) {
    const body = document.getElementById('mascotBody');
    body.innerHTML = blobSVG(type === 'login' ? 'proud' : 'happy');
    const bbl = document.getElementById('mascotBubble');
    bbl.style.display = 'block';
    document.getElementById('mbMsg').textContent = type === 'login' ? "반가워요! 오늘도 안전하게!" : "준비 완료!";
    setTimeout(() => { bbl.style.display = 'none'; }, 3000);
}

// [3D 뷰어 엔진 복구]
let tS, tC, tR;
function init3D() {
    const ct = document.getElementById('v3d');
    if(ct.innerHTML.includes('canvas')) return;
    tS = new THREE.Scene();
    tS.background = new THREE.Color(0x0d1117);
    tC = new THREE.PerspectiveCamera(45, ct.clientWidth/ct.clientHeight, 0.1, 1000);
    tR = new THREE.WebGLRenderer({ antialias: true });
    tR.setSize(ct.clientWidth, ct.clientHeight);
    ct.appendChild(tR.domElement);
    
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(10, 20, 10);
    tS.add(light);
    tS.add(new THREE.AmbientLight(0x404040));
    
    tC.position.set(50, 50, 50);
    tC.lookAt(0, 0, 0);

    // [서버 데이터로 빌딩 생성]
    loadBuildingsFromDB();

    function animate() { requestAnimationFrame(animate); tR.render(tS, tC); }
    animate();
}

async function loadBuildingsFromDB() {
    if(!currentSiteId) return;
    const { data: bldgs } = await _supabase.from('buildings').select('*').eq('site_id', currentSiteId);
    if(bldgs) {
        bldgs.forEach(b => {
            const geo = new THREE.BoxGeometry(10, b.above_floors * 2, 10);
            const mat = new THREE.MeshStandardMaterial({ color: 0x3b82f6, transparent: true, opacity: 0.7 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(b.pos_x, (b.above_floors * 2)/2, b.pos_z);
            tS.add(mesh);
        });
    }
}

// [관리자 기능]
async function renderAdminSites() {
    const { data: sites } = await _supabase.from('sites').select('*');
    const grid = document.getElementById('adminSiteGrid');
    if (!sites) return;
    grid.innerHTML = sites.map(s => `
        <div class="sc" onclick="enterSite('${s.id}')" style="cursor:pointer">
            <div style="font-weight:700;">${s.name}</div>
            <div style="font-size:10px; color:var(--t2);">${s.location}</div>
        </div>
    `).join('');
}
function enterSite(id) { currentSiteId = id; nav('dash'); }
</script>
</body>
</html>
